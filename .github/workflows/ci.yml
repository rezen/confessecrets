name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -race ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: |
          pkg=github.com/rezen/confessecrets/pkg/version
          commit=$(git rev-parse --short HEAD)
          date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -v \
            -ldflags "-X ${pkg}.Commit=${commit} -X ${pkg}.Date=${date}" \
            -o confessecrets ./cmd/confessecrets

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: confessecrets
          path: confessecrets
